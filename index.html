<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>HomeFit AI · New Jersey</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;0,700;1,600&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#f8f5ef;--surface:#fff;--surface2:#f0ebe2;--border:#e4ddd3;
  --text:#1c1a17;--text2:#6b6257;--text3:#a09589;
  --navy:#0f1f3d;--navy2:#1a3060;--gold:#c4943a;--gold2:#8b6420;
  --green-bg:#edf7ed;--green-fg:#1a5c1a;
  --blue-bg:#e8f0fb;--blue-fg:#1a3c8b;
  --amber-bg:#fef3e0;--amber-fg:#7a4b00;
  --red-bg:#fde8e8;--red-fg:#8b1a1a;
  --r:14px;--rl:20px;
  --sh:0 2px 16px rgba(15,31,61,.07);--shl:0 8px 40px rgba(15,31,61,.12);
}
.dark{
  --bg:#0c1220;--surface:#131d30;--surface2:#1a2640;--border:#243050;
  --text:#e8e4de;--text2:#8a8c9e;--text3:#5a5c6e;
  --green-bg:#0d3d0d;--green-fg:#7ee787;
  --blue-bg:#0d1f40;--blue-fg:#79c0ff;
  --amber-bg:#3d2400;--amber-fg:#e3b341;
  --red-bg:#3d0c0c;--red-fg:#ff7b72;
  --sh:0 2px 16px rgba(0,0,0,.4);--shl:0 8px 40px rgba(0,0,0,.6);
}
html,body{background:var(--bg);color:var(--text);font-family:'Outfit',system-ui,sans-serif;font-size:15px;line-height:1.6;transition:background .3s,color .3s;}
h1,h2,h3,.serif{font-family:'Cormorant Garamond',Georgia,serif;}
#theme-btn{position:fixed;top:14px;right:14px;z-index:9999;width:42px;height:42px;border-radius:50%;border:1.5px solid var(--border);background:var(--surface);cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;box-shadow:var(--sh);transition:transform .2s;}
#theme-btn:hover{transform:scale(1.1);}
.login{min-height:100vh;display:grid;grid-template-columns:1fr 1fr;}
@media(max-width:760px){.login{grid-template-columns:1fr;}}
.login-l{padding:60px 48px;background:linear-gradient(145deg,#0f1f3d 0%,#060f20 100%);display:flex;flex-direction:column;justify-content:center;position:relative;overflow:hidden;}
.login-l::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 20% 30%,rgba(196,148,58,.08) 0%,transparent 60%);pointer-events:none;}
.logo-pill{display:inline-flex;align-items:center;gap:8px;background:rgba(196,148,58,.15);border:1px solid rgba(196,148,58,.3);border-radius:100px;padding:7px 16px;font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:#c4943a;width:fit-content;margin-bottom:28px;}
.login-title{font-size:clamp(36px,5vw,56px);font-weight:700;color:#fff;line-height:1.05;margin-bottom:18px;}
.login-title span{color:#c4943a;font-style:italic;}
.login-sub{color:rgba(255,255,255,.55);font-size:15px;max-width:400px;line-height:1.7;margin-bottom:36px;}
.feat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;max-width:460px;}
.feat-card{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);border-radius:var(--r);padding:15px;}
.feat-card .fi{font-size:18px;margin-bottom:5px;}
.feat-card h4{font-size:12px;font-weight:600;color:rgba(255,255,255,.85);margin-bottom:3px;}
.feat-card p{font-size:11px;color:rgba(255,255,255,.4);line-height:1.5;}
.login-r{background:var(--bg);display:flex;align-items:center;justify-content:center;padding:48px 40px;}
.login-form{width:100%;max-width:420px;}
.login-form h2{font-size:32px;font-weight:700;margin-bottom:6px;}
.login-form .sub{color:var(--text2);font-size:13px;margin-bottom:24px;}
.fg{margin-bottom:14px;}
.fg label{display:block;font-size:12px;font-weight:600;color:var(--text2);margin-bottom:6px;text-transform:uppercase;letter-spacing:.05em;}
.iw{display:flex;align-items:center;gap:10px;border:1.5px solid var(--border);border-radius:var(--r);padding:0 14px;background:var(--surface);transition:border-color .2s;}
.iw:focus-within{border-color:var(--navy);}
.iw .ic{color:var(--text3);font-size:16px;flex-shrink:0;}
.iw input{flex:1;border:none;outline:none;padding:12px 0;background:transparent;font-family:inherit;font-size:14px;color:var(--text);}
.agent-btns{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.ab{border:1.5px solid var(--border);border-radius:var(--r);padding:11px 8px;font-family:inherit;font-size:12px;font-weight:500;cursor:pointer;background:var(--surface);transition:all .2s;color:var(--text);}
.ab:hover{border-color:var(--navy);}
.ab.on{border-color:var(--navy);background:var(--navy);color:#fff;}
.btn-cta{width:100%;padding:14px;background:var(--navy);color:#fff;border:none;border-radius:var(--r);font-family:inherit;font-size:14px;font-weight:600;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:8px;margin-top:18px;}
.btn-cta:hover:not(:disabled){background:var(--navy2);transform:translateY(-1px);}
.btn-cta:disabled{opacity:.4;cursor:not-allowed;}
.hint{text-align:center;font-size:11px;color:var(--text3);margin-top:8px;}
.topbar{position:sticky;top:0;z-index:100;background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:60px;}
.brand{display:flex;align-items:center;gap:11px;}
.brand-icon{width:34px;height:34px;background:var(--navy);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:15px;}
.brand-name{font-family:'Cormorant Garamond',serif;font-size:17px;font-weight:700;}
.brand-tag{font-size:10px;color:var(--text3);}
.topnav{display:flex;align-items:center;gap:3px;padding-right:54px;}
@media(max-width:860px){.topnav{display:none;}}
.tn{padding:6px 11px;border-radius:9px;font-family:inherit;font-size:12px;font-weight:500;cursor:pointer;border:1.5px solid transparent;background:transparent;color:var(--text2);white-space:nowrap;transition:all .15s;}
.tn:hover{background:var(--surface2);color:var(--text);}
.tn.on{background:var(--navy);color:#fff;border-color:var(--navy);}
.logout{padding:6px 12px;border:1.5px solid var(--border);border-radius:9px;background:transparent;color:var(--text2);font-family:inherit;font-size:12px;cursor:pointer;transition:all .15s;}
.logout:hover{border-color:var(--text);color:var(--text);}
.page{max-width:1260px;margin:0 auto;padding:36px 20px 80px;}
.hero{display:grid;grid-template-columns:1.4fr 1fr;gap:32px;margin-bottom:40px;align-items:start;}
@media(max-width:840px){.hero{grid-template-columns:1fr;}}
.hero-badge{display:inline-flex;align-items:center;gap:6px;background:var(--surface);border:1px solid var(--border);border-radius:100px;padding:5px 13px;font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--text2);margin-bottom:16px;}
.hero-badge::before{content:'●';color:var(--gold);font-size:7px;}
.hero h1{font-size:clamp(28px,4vw,48px);font-weight:700;line-height:1.08;margin-bottom:14px;}
.hero h1 em{font-style:italic;color:var(--gold2);}
.hero-sub{font-size:14px;color:var(--text2);max-width:460px;line-height:1.75;}
.profile-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:22px;box-shadow:var(--sh);}
.profile-card h3{font-size:17px;font-weight:700;margin-bottom:3px;}
.psub{font-size:11px;color:var(--text2);margin-bottom:14px;}
.info-row{display:flex;justify-content:space-between;align-items:center;padding:8px 11px;background:var(--surface2);border-radius:9px;margin-bottom:6px;font-size:13px;}
.info-row .lbl{color:var(--text2);font-weight:500;}
.info-row .val{font-weight:600;}
.mob-tabs{display:none;gap:5px;margin-bottom:18px;flex-wrap:wrap;}
@media(max-width:860px){.mob-tabs{display:flex;}}
.mob-tabs button{flex:1;min-width:80px;padding:8px 6px;border-radius:9px;font-family:inherit;font-size:10px;font-weight:500;cursor:pointer;border:1.5px solid var(--border);background:var(--surface);color:var(--text2);transition:all .15s;}
.mob-tabs button.on{background:var(--navy);color:#fff;border-color:var(--navy);}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:24px;box-shadow:var(--sh);}
.card h3{font-size:19px;font-weight:700;margin-bottom:4px;}
.csub{font-size:12px;color:var(--text2);margin-bottom:18px;}
.divider{width:40px;height:3px;background:var(--gold);border-radius:2px;margin:12px 0 20px;}
.btn{padding:8px 14px;border-radius:10px;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;border:1.5px solid var(--border);background:var(--surface2);color:var(--text);}
.btn:hover{border-color:var(--navy);background:var(--navy);color:#fff;}
.btn.pri{background:var(--navy);color:#fff;border-color:var(--navy);}
.btn.pri:hover{background:var(--navy2);}
.btn.ghost{background:transparent;border-color:var(--border);}
.btn.ghost:hover{border-color:var(--navy);}
.btn.danger{background:var(--red-bg);color:var(--red-fg);border-color:var(--red-fg);}
.btn.danger:hover{background:var(--red-fg);color:#fff;}
.btn:disabled{opacity:.45;cursor:not-allowed;pointer-events:none;}
input.fi,select.fi,textarea.fi{width:100%;padding:10px 14px;border:1.5px solid var(--border);border-radius:var(--r);font-family:inherit;font-size:13px;color:var(--text);background:var(--surface);outline:none;transition:border-color .2s;margin-bottom:10px;}
input.fi:focus,select.fi:focus,textarea.fi:focus{border-color:var(--navy);}
.flbl{font-size:11px;font-weight:600;color:var(--text2);margin-bottom:5px;display:block;text-transform:uppercase;letter-spacing:.05em;}
.tag{background:var(--surface2);border-radius:100px;padding:3px 10px;font-size:10px;font-weight:600;color:var(--text2);}
.tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:12px;}
.chip{padding:5px 11px;border-radius:100px;font-family:inherit;font-size:11px;font-weight:600;cursor:pointer;border:1.5px solid var(--border);background:var(--bg);color:var(--text2);transition:all .14s;}
.chip:hover{border-color:var(--navy);color:var(--navy);}
.chip.on{background:var(--navy);color:#fff;border-color:var(--navy);}
.chip.must{background:var(--gold2);color:#fff;border-color:var(--gold2);}
.chip-grid{display:flex;flex-wrap:wrap;gap:5px;}
.sb{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:100px;font-size:10px;font-weight:700;letter-spacing:.03em;}
.sb.sf{background:var(--green-bg);color:var(--green-fg);}
.sb.gf{background:var(--blue-bg);color:var(--blue-fg);}
.sb.nr{background:var(--amber-bg);color:var(--amber-fg);}
.sb.pf{background:var(--red-bg);color:var(--red-fg);}
.sb::before{content:'●';font-size:7px;}
.filter-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:22px;box-shadow:var(--sh);margin-bottom:22px;}
.filter-card h3{font-size:20px;font-weight:700;margin-bottom:4px;}
.fgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:9px;}
.fgrid .fi{margin-bottom:0;}
.fgrid .span2{grid-column:span 2;}
@media(max-width:600px){.fgrid .span2{grid-column:span 1;}}
.filter-count{margin-top:9px;background:var(--surface2);border-radius:9px;padding:9px 14px;font-size:11px;font-weight:600;color:var(--text2);}
.listings-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(330px,1fr));gap:20px;}
.lcard{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);overflow:hidden;box-shadow:var(--sh);transition:transform .2s,box-shadow .2s;}
.lcard:hover{transform:translateY(-3px);box-shadow:var(--shl);}
.lcard-img{position:relative;height:200px;overflow:hidden;cursor:pointer;}
.for-sale{position:absolute;top:10px;left:10px;background:rgba(255,255,255,.9);backdrop-filter:blur(6px);padding:3px 10px;border-radius:100px;font-size:9px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#0f1f3d;}
.ai-badge{position:absolute;bottom:10px;right:10px;background:#0f1f3d;color:#fff;padding:6px 11px;border-radius:10px;text-align:center;}
.ai-badge .al{font-size:8px;color:rgba(255,255,255,.6);}
.ai-badge .as{font-size:19px;font-weight:700;line-height:1.1;}
.lcard-body{padding:18px;}
.lcard-price{font-size:22px;font-weight:700;margin-bottom:2px;}
.lcard-addr{font-weight:600;font-size:12px;cursor:pointer;}
.lcard-addr:hover{text-decoration:underline;color:var(--navy);}
.lcard-meta{font-size:10px;color:var(--text2);margin-top:2px;margin-bottom:10px;}
.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:10px;}
.stat-box{background:var(--surface2);border-radius:8px;padding:8px;}
.stat-box .sl{font-size:8px;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:.05em;}
.stat-box .sv{font-size:11px;font-weight:700;margin-top:1px;}
.card-btns{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px;}
.detail-back{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;flex-wrap:wrap;gap:8px;}
.detail-photos{display:grid;grid-template-columns:1.4fr .6fr;gap:9px;margin-bottom:18px;}
@media(max-width:680px){.detail-photos{grid-template-columns:1fr;}}
.detail-main{height:380px;border-radius:var(--rl);overflow:hidden;}
.detail-thumbs{display:grid;grid-template-rows:repeat(4,1fr);gap:6px;}
.detail-thumb{border-radius:10px;overflow:hidden;cursor:pointer;border:2px solid transparent;transition:border-color .2s;}
.detail-thumb.on{border-color:var(--navy);}
.detail-header{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;margin-bottom:18px;flex-wrap:wrap;}
.detail-price{font-size:36px;font-weight:700;}
.detail-addr{font-size:18px;font-weight:700;margin-top:3px;}
.detail-loc{color:var(--text2);font-size:12px;margin-top:2px;}
.score-box{background:var(--navy);color:#fff;border-radius:var(--rl);padding:18px 22px;min-width:140px;text-align:center;}
.score-box .slbl{font-size:10px;color:rgba(255,255,255,.6);margin-bottom:2px;}
.score-box .snum{font-size:46px;font-weight:700;line-height:1;}
.spec-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:8px;margin-bottom:20px;}
.spec-box{background:var(--surface2);border-radius:10px;padding:12px;}
.spec-box .sl{font-size:9px;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:.06em;}
.spec-box .sv{font-size:13px;font-weight:700;margin-top:2px;}
.detail-cols{display:grid;grid-template-columns:1.1fr .9fr;gap:18px;}
@media(max-width:680px){.detail-cols{grid-template-columns:1fr;}}
.detail-desc h3{font-size:19px;font-weight:700;margin-bottom:8px;}
.detail-desc p{color:var(--text2);font-size:13px;line-height:1.8;}
.dd-box{background:var(--amber-bg);border:1px solid var(--border);border-radius:var(--rl);padding:18px;}
.dd-box h3{font-size:16px;font-weight:700;color:var(--amber-fg);margin-bottom:10px;}
.dd-box li{font-size:12px;color:var(--amber-fg);margin-bottom:6px;list-style:none;padding-left:14px;position:relative;}
.dd-box li::before{content:'→';position:absolute;left:0;opacity:.7;}
.finder{display:grid;grid-template-columns:340px 1fr;gap:20px;align-items:start;}
@media(max-width:940px){.finder{grid-template-columns:1fr;}}
.finder-panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:22px;box-shadow:var(--sh);position:sticky;top:72px;max-height:calc(100vh - 86px);overflow-y:auto;}
.finder-panel h3{font-size:18px;font-weight:700;margin-bottom:3px;}
.finder-panel .fsub{font-size:12px;color:var(--text2);margin-bottom:16px;}
.pref-sec{margin-bottom:16px;border-bottom:1px solid var(--border);padding-bottom:15px;}
.pref-sec:last-of-type{border-bottom:none;}
.pref-sec h4{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text3);margin-bottom:8px;}
.find-btn{width:100%;padding:13px;background:linear-gradient(135deg,var(--navy),var(--gold2));color:#fff;border:none;border-radius:var(--r);font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;transition:opacity .2s;}
.find-btn:hover{opacity:.9;transform:translateY(-1px);}
.find-reset{width:100%;padding:8px;margin-top:6px;background:transparent;border:1.5px solid var(--border);border-radius:var(--r);font-family:inherit;font-size:11px;font-weight:600;color:var(--text2);cursor:pointer;transition:all .15s;}
.find-reset:hover{border-color:var(--text);color:var(--text);}
.results-area h3{font-size:20px;font-weight:700;margin-bottom:4px;}
.no-results{text-align:center;padding:50px 20px;}
.no-results .nri{font-size:48px;margin-bottom:12px;}
.no-results h4{font-size:19px;font-weight:700;margin-bottom:6px;}
.no-results p{color:var(--text2);font-size:13px;line-height:1.8;max-width:440px;margin:0 auto;}
.loading{text-align:center;padding:50px 20px;}
.spinner{width:44px;height:44px;border:4px solid var(--surface2);border-top-color:var(--navy);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px;}
.finder-summary{background:linear-gradient(135deg,var(--navy),var(--navy2));color:#fff;border-radius:var(--rl);padding:18px 22px;margin-bottom:18px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;}
.finder-summary h4{font-size:16px;font-weight:700;margin-bottom:2px;}
.finder-summary p{font-size:11px;color:rgba(255,255,255,.6);}
.finder-stats{display:flex;gap:20px;}
.fstat .fn{font-size:24px;font-weight:700;}
.fstat .fl{font-size:9px;color:rgba(255,255,255,.5);text-transform:uppercase;letter-spacing:.06em;}
.active-filters{background:var(--surface2);border-radius:9px;padding:10px 14px;margin-bottom:12px;font-size:11px;color:var(--text2);}
.active-filters strong{color:var(--text);}
.match-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);overflow:hidden;box-shadow:var(--sh);margin-bottom:16px;transition:transform .2s,box-shadow .2s;animation:fadeUp .4s ease both;}
.match-card:hover{transform:translateY(-2px);box-shadow:var(--shl);}
.match-inner{display:grid;grid-template-columns:240px 1fr;}
@media(max-width:680px){.match-inner{grid-template-columns:1fr;}}
.match-img{position:relative;min-height:180px;}
.rank-badge{position:absolute;top:10px;left:10px;z-index:2;width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;box-shadow:0 2px 8px rgba(0,0,0,.3);}
.match-body{padding:18px;}
.match-hdr{display:flex;justify-content:space-between;align-items:flex-start;gap:9px;margin-bottom:9px;flex-wrap:wrap;}
.match-price{font-size:22px;font-weight:700;}
.match-addr{font-size:12px;font-weight:700;margin-top:2px;}
.match-meta{font-size:10px;color:var(--text2);margin-top:2px;}
.score-pill{display:flex;flex-direction:column;align-items:center;background:var(--navy);color:#fff;border-radius:11px;padding:8px 14px;min-width:68px;}
.score-pill .spl{font-size:8px;color:rgba(255,255,255,.5);}
.score-pill .spn{font-size:20px;font-weight:700;line-height:1.1;}
.match-bar{height:5px;background:var(--surface2);border-radius:100px;overflow:hidden;margin:8px 0 5px;}
.match-bar-fill{height:100%;border-radius:100px;transition:width 1s ease;}
.why h5{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--text3);margin-bottom:6px;}
.why-chips{display:flex;flex-wrap:wrap;gap:4px;}
.wc{padding:2px 8px;border-radius:100px;font-size:9px;font-weight:700;}
.wc.g{background:var(--green-bg);color:var(--green-fg);}
.wc.a{background:var(--amber-bg);color:var(--amber-fg);}
.ms-wrap{position:relative;width:100%;}
.ms-trigger{width:100%;padding:10px 14px;border:1.5px solid var(--border);border-radius:var(--r);font-family:inherit;font-size:12px;color:var(--text);background:var(--surface);cursor:pointer;display:flex;align-items:center;justify-content:space-between;transition:border-color .2s;text-align:left;}
.ms-trigger.open{border-color:var(--navy);}
.ms-count{background:var(--navy);color:#fff;border-radius:100px;padding:1px 6px;font-size:9px;font-weight:700;}
.ms-drop{position:absolute;top:calc(100% + 4px);left:0;right:0;background:var(--surface);border:1.5px solid var(--navy);border-radius:var(--r);box-shadow:var(--shl);z-index:400;max-height:230px;overflow-y:auto;}

function buyerLogin(){
  const email=(S.loginEmail||'').toLowerCase();
  const pass=S.loginPass||'';

  if(!found){showAuthMsg('err','Login not found. Use the same email/password created during sign up on this browser.');return;}
  S.buyer={name:found.name,phone:found.phone,email:found.email,password:found.password,agent:found.agent};

  showAuthMsg('ok','Login successful.');
  setTimeout(()=>doLogin(),400);
}


function moneyNum(v){return Number(String(v||'').replace(/[^0-9.]/g,''))||0;}
function monthlyPI(price,down,rate,years){
  const loan=Math.max(0,price-down);
  const r=(rate/100)/12,n=years*12;
  if(!r)return loan/n;
  return loan*(r*Math.pow(1+r,n))/(Math.pow(1+r,n)-1);
}
function calcMortgage(){
  const price=moneyNum(document.getElementById('calcPrice')?.value);
  const down=moneyNum(document.getElementById('calcDown')?.value);
  const rate=Number(document.getElementById('calcRate')?.value||6.75);
  const tax=moneyNum(document.getElementById('calcTax')?.value);
  const ins=moneyNum(document.getElementById('calcIns')?.value)||1800;
  const maint=moneyNum(document.getElementById('calcMaint')?.value)||300;
  const pi=monthlyPI(price,down,rate,30);
  const total=pi+(tax/12)+(ins/12)+maint;
  const out=document.getElementById('mortgageOut');
  if(out)out.innerHTML=`<strong>$${Math.round(total).toLocaleString()}/mo</strong>Includes mortgage, NJ taxes, insurance, and maintenance estimate.`;
}
function calcCommute(){
  const mins=Number(document.getElementById('commuteMins')?.value||0);
  const days=Number(document.getElementById('commuteDays')?.value||5);
  const yearly=Math.round((mins*2*days*48)/60);
  const score=Math.max(35,100-Math.round(mins*1.15));
  const out=document.getElementById('commuteOut');
  if(out)out.innerHTML=`<strong>${score}/100 commute score</strong>Estimated ${yearly.toLocaleString()} hours/year in commute time.`;
}
function calcTaxRisk(){
  const tax=moneyNum(document.getElementById('taxAmount')?.value);
  const income=moneyNum(document.getElementById('incomeAmount')?.value);
  const pct=income?((tax/income)*100):0;
  const risk=pct>12?'High tax pressure':pct>8?'Moderate tax pressure':'Comfortable tax pressure';
  const out=document.getElementById('taxOut');
  if(out)out.innerHTML=`<strong>${risk}</strong>NJ taxes are about ${pct.toFixed(1)}% of yearly income.`;
}
function calcWhyFit(){
  const home=S.saved[0]||LISTINGS[0];
  const fit=home.aiRating||82;
  const emotion=fit>85?22:fit>72?38:55;
  const afford=fit>85?88:fit>72?76:61;
  return {home,fit,emotion,afford,resale:Math.min(96,fit+5),school:fit>85?'A / strong family fit':fit>72?'B+ / solid fit':'Needs school review'};
}

<li>Review inspection items, roof age, HVAC, flood zone, and insurance.</li>
<li>Do not let emotion override budget comfort.</li>
</ul></div></div>

<div class="dash-grid"><div class="card"><h3>Save a NJ Home</h3><p class="csub">Add homes you are considering. Allie AI™ will score and compare them.</p><input class="fi" id="ha" placeholder="Property address"><input class="fi" id="hp" placeholder="Price, e.g. $699,000"><input class="fi" id="ht" placeholder="Taxes, e.g. $12,900/year"><input class="fi" id="hb" placeholder="Beds/Baths, e.g. 4 beds · 2.5 baths"><textarea class="fi" id="hn" placeholder="Notes, concerns, must-haves, commute, schools..." rows="3"></textarea><button class="btn pri" onclick="addHome()">Add Home</button></div><div class="card"><h3>Best Saved Home</h3><p class="csub">Allie AI™ highlights the strongest fit based on saved homes.</p>${best?`<div class="shc"><div class="shc-top"><div class="shc-info"><h4>${best.address}</h4><p>${best.price} · ${best.taxes}</p><p>${best.beds}</p><p class="note">${best.notes}</p></div><div class="shc-ratings"><div class="rbox dark"><div class="rl">AI Fit</div><div class="rv">${best.aiRating}/100</div></div><div class="rbox light"><div class="rl">Buyer</div><div class="rv">${best.userRating}/5</div></div></div></div></div>`:`<p class="csub">No saved homes yet. Add or favorite a listing to activate this panel.</p>`}</div></div>

<div class="card"><h3>Saved Homes</h3><p class="csub">Your saved homes, scores, notes, and emotional-risk checks.</p>${S.saved.length?S.saved.map((h,i)=>`<div class="shc"><div class="shc-top"><div class="shc-info"><h4>${h.address}</h4><p>${h.price} · ${h.taxes} · ${h.beds}</p><p class="note">${h.notes}</p><div class="shc-meta"><span class="sb ${h.aiRating>=80?'sf':h.aiRating>=65?'gf':'nr'}">${h.status}</span><span class="tag">AI ${h.aiRating}/100</span><span class="tag">Buyer ${h.userRating}/5</span></div></div><div class="shc-ratings"><button class="btn ghost" onclick="rateHome(${i},1)">⭐ 1</button><button class="btn ghost" onclick="rateHome(${i},3)">⭐ 3</button><button class="btn ghost" onclick="rateHome(${i},5)">⭐ 5</button><button class="btn danger" onclick="removeHome(${i})">Remove</button></div></div><textarea class="notes-input" placeholder="Agent / buyer notes..." oninput="S.saved[${i}].agentNotes=this.value">${h.agentNotes||''}</textarea></div>`).join(''):`<p class="csub">No saved homes yet. Add one above or favorite a listing from the Search page.</p>`}</div>
</div>`;}

function renderReview(){const q=QUESTIONS[S.qStep<QUESTIONS.length?S.qStep:QUESTIONS.length-1];const r=scoreAnswers(S.qAnswers);const pct=(S.qStep/QUESTIONS.length)*100;const sidePanel=`<div class="card"><h3 style="font-size:18px;margin-bottom:4px">What AI Reviews for NJ</h3><div class="divider"></div><div class="rev-points">${[['💰','NJ Property Taxes','Compares taxes against payment comfort and long-term risk.'],['🏫','Schools & Children','Weights school needs, parks, streets, and family lifestyle.'],['📍','Town Fit','Suburb, shore, NYC commute, walkability, privacy, or value.'],['❤️','Emotion Check','Flags when love for the home may be overriding the facts.'],['📋','Due Diligence','Prompts flood zones, inspection, attorney, HOA, insurance.'],['🤝','Realtor Collaboration','Agent notes and buyer scores visible side-by-side for teamwork.']].map(([i,t,d])=>`<div class="pt"><div class="pi">${i}</div><div><h4>${t}</h4><p>${d}</p></div></div>`).join('')}</div></div>`;if(S.qDone){return`<div class="review-grid fade-up"><div class="card"><div style="display:flex;align-items:center;gap:11px;margin-bottom:20px"><div style="width:40px;height:40px;background:var(--navy);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px">🛡️</div><div><h3 style="font-size:20px">NJ Home Fit Questionnaire</h3><p style="font-size:11px;color:var(--text2)">Remove emotion. Expose the real fit.</p></div></div><div class="result-score"><span class="rtag">NJ HomeFit Score</span><div class="rbig">${r.score}<span style="font-size:20px;color:rgba(255,255,255,.4)">/100</span></div><div class="rverdict">${r.verdict}</div><p class="rnote">First-pass tool only. Not a replacement for inspection, lender approval, attorney, title, or local due diligence.</p></div><div class="result-panels"><div class="rpanel pos"><h5>✓ Positive Signals</h5><ul>${(r.pos.length?r.pos:['No strong positives entered yet.']).map(p=>`<li>${p}</li>`).join('')}</ul></div><div class="rpanel flag"><h5>⚠ Risk Flags</h5><ul>${(r.flags.length?r.flags:['No major risk flags detected.']).map(f=>`<li>${f}</li>`).join('')}</ul></div></div><div style="display:flex;gap:8px"><button class="btn pri" onclick="saveReport()">💾 Save Report</button><button class="btn ghost" onclick="restartReview()">↺ Restart</button></div></div>${sidePanel}</div>`;}return`<div class="review-grid fade-up"><div class="card"><div style="display:flex;align-items:center;gap:11px;margin-bottom:20px"><div style="width:40px;height:40px;background:var(--navy);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px">🛡️</div><div><h3 style="font-size:20px">NJ Home Fit Questionnaire</h3><p style="font-size:11px;color:var(--text2)">Remove emotion. Expose the real fit.</p></div></div><div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div><p class="q-counter">Question ${S.qStep+1} of ${QUESTIONS.length} · ${q.cat}</p><p class="q-label">${q.label}</p>${q.type==='select'?`<div class="opts-grid">${q.options.map(o=>`<button class="opt${S.qAnswers[q.id]===o?' on':''}" onclick="answerQ('${q.id}','${o.replace(/'/g,"\\'")}',this)">${o}</button>`).join('')}</div>`:`<textarea class="q-ta" placeholder="${q.placeholder||''}" oninput="S.qAnswers['${q.id}']=this.value">${S.qAnswers[q.id]||''}</textarea>`}<div class="q-nav"><button class="btn ghost" onclick="qBack()" ${S.qStep===0?'disabled':''}>← Back</button><button class="btn pri" onclick="qNext()">Next →</button></div></div>${sidePanel}</div>`;}
function renderMortgage(){const m=S.mortgage||{price:750000,down:20,rate:6.75,years:30,taxes:12000,insurance:1800,pmi:0.5};S.mortgage=m;const price=Number(m.price)||0;const downPct=Number(m.down)||0;const down=price*(downPct/100);const loan=Math.max(0,price-down);const months=(Number(m.years)||30)*12;const monthlyRate=(Number(m.rate)||0)/100/12;const principal=loan&&monthlyRate?(loan*monthlyRate*Math.pow(1+monthlyRate,months))/(Math.pow(1+monthlyRate,months)-1):(months?loan/months:0);const taxMo=(Number(m.taxes)||0)/12;const insMo=(Number(m.insurance)||0)/12;const pmiMo=downPct<20?(loan*((Number(m.pmi)||0)/100)/12):0;const total=Math.round(principal+taxMo+insMo+pmiMo);const fmt=n=>'$'+Math.round(n||0).toLocaleString();return`<div class="review-grid fade-up"><div class="card"><div style="display:flex;align-items:center;gap:11px;margin-bottom:18px"><div style="width:40px;height:40px;background:var(--navy);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;color:#fff">🧮</div><div><h3 style="font-size:20px">Mortgage + Monthly Cost</h3><p style="font-size:11px;color:var(--text2)">Allie AI™ estimates payment pressure before you fall in love with the home.</p></div></div><div class="fgrid"><div><label class="flbl">Home Price</label><input class="fi" type="number" value="${m.price}" oninput="S.mortgage.price=this.value;document.getElementById('tab-content').innerHTML=renderMortgage()"></div><div><label class="flbl">Down Payment %</label><input class="fi" type="number" value="${m.down}" oninput="S.mortgage.down=this.value;document.getElementById('tab-content').innerHTML=renderMortgage()"></div><div><label class="flbl">Interest Rate</label><input class="fi" type="number" step="0.01" value="${m.rate}" oninput="S.mortgage.rate=this.value;document.getElementById('tab-content').innerHTML=renderMortgage()"></div><div><label class="flbl">Years</label><select class="fi" onchange="S.mortgage.years=this.value;document.getElementById('tab-content').innerHTML=renderMortgage()"><option ${m.years==30?'selected':''}>30</option><option ${m.years==15?'selected':''}>15</option></select></div><div><label class="flbl">Yearly NJ Taxes</label><input class="fi" type="number" value="${m.taxes}" oninput="S.mortgage.taxes=this.value;document.getElementById('tab-content').innerHTML=renderMortgage()"></div><div><label class="flbl">Yearly Insurance</label><input class="fi" type="number" value="${m.insurance}" oninput="S.mortgage.insurance=this.value;document.getElementById('tab-content').innerHTML=renderMortgage()"></div></div></div><div class="card"><h3>Allie AI™ Payment Breakdown</h3><p class="csub">Estimate only. Confirm with lender, tax records, insurance, HOA, and attorney.</p><div class="result-score"><div class="rtag">Estimated Monthly Cost</div><div class="rbig">${fmt(total)}</div><p class="rnote">Principal & interest: ${fmt(principal)} · Taxes: ${fmt(taxMo)} · Insurance: ${fmt(insMo)} ${pmiMo?`· PMI: ${fmt(pmiMo)}`:''}</p></div><div class="result-panels"><div class="rpanel pos"><h5>✓ Good Signs</h5><ul><li>Use this to compare homes by monthly reality, not price alone.</li><li>Taxes are separated so NJ payment pressure is clear.</li></ul></div><div class="rpanel flag"><h5>⚠ Allie AI™ Flags</h5><ul><li>${downPct<20?'Down payment below 20% may add PMI.':'20%+ down removes typical PMI concern.'}</li><li>Also check HOA, flood insurance, utilities, repairs, and commute cost.</li></ul></div></div></div></div>`;}

function renderChat(){return`<div class="chat-wrap fade-up"><div style="display:flex;align-items:center;gap:11px;margin-bottom:18px"><div style="width:40px;height:40px;background:var(--surface2);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px">🗣️</div><div><h3 style="font-size:20px">🤖 Allie AI™</h3><p style="font-size:12px;color:var(--text2);line-height:1.7"><strong>Your Personal NJ Home Buying Assistant</strong><br>Helping you compare homes, evaluate affordability, avoid emotional decisions, and find the best-fit home. Type, talk, or listen to answers aloud.</p></div></div><div class="chat-msgs" id="chat-msgs">${S.msgs.map(m=>`<div class="msg ${m.role}">${m.text}</div>`).join('')}</div><div class="chat-chips">${['Am I overpaying?','What should I ask my realtor?','How do NJ taxes work?','Which homes scored highest?','Build my offer strategy'].map(s=>`<button class="chip" onclick="chatQuick('${s}')" style="font-size:10px">${s}</button>`).join('')}</div><div class="chat-input-row"><button class="send-btn" title="Voice input" onclick="startAllieVoice()">🎤</button><input class="chat-in" id="chat-input" placeholder="Ask Allie AI™: Is this NJ home right for me?" value="${S.chatInput||''}" oninput="S.chatInput=this.value" onkeydown="if(event.key==='Enter')sendChat()"><button class="send-btn" onclick="sendChat()">Send</button><button class="send-btn" title="Read Allie answer aloud" onclick="speakAllie()">🔊</button></div><p style="font-size:10px;color:var(--text3);margin-top:8px">Voice and audio use your browser. Chrome works best. If blocked, typing still works.</p></div>`;}
function attachEvents(){document.getElementById('theme-btn').onclick=toggleTheme;}
function toggleTheme(){S.dark=!S.dark;document.documentElement.classList.toggle('dark',S.dark);document.getElementById('theme-btn').textContent=S.dark?'☀️':'🌙';localStorage.setItem('hf-dark',S.dark?'1':'0');}
function setAgent(v){S.buyer.agent=v;renderApp();}
function updateLoginBtn(){updateAuthBtn();}
function doLogin(){if(!S.buyer.name||!S.buyer.phone||!S.buyer.email||!S.buyer.agent)return;S.loggedIn=true;S.msgs=[{role:'bot',text:`Welcome ${S.buyer.name}! I’m Allie AI™, your personal NJ home buying assistant. Your NJ buyer profile is saved. Use 🎯 Find My Home to get AI-ranked listings. Your agent can view your saved homes, scores, notes, offer plan, and risk flags on the Dashboard anytime.`}];renderApp();}
function doLogout(){S.loggedIn=false;S.tab='search';S.listing=null;renderApp();}
function goTab(id){S.tab=id;S.listing=null;const el=document.getElementById('tab-content');if(el){el.className='fade-up';el.innerHTML=renderTab();}document.querySelectorAll('.tn').forEach(b=>{b.classList.toggle('on',b.getAttribute('onclick').includes(`'${id}'`));});document.querySelectorAll('.mob-tabs button').forEach(b=>{b.classList.toggle('on',b.getAttribute('onclick').includes(`'${id}'`));});if(id==='chat')setTimeout(scrollChat,50);}
function viewListing(id){const l=LISTINGS.find(x=>x.id===id)||LISTINGS.find(x=>x.id===String(id));if(!l)return;S.listing=l;S.photoIdx=0;S.tab='search';const el=document.getElementById('tab-content');if(el){el.className='fade-up';el.innerHTML=renderDetail();}document.querySelectorAll('.tn').forEach(b=>b.classList.toggle('on',b.getAttribute('onclick').includes("'search'")));}
function closeDetail(){S.listing=null;S.photoIdx=0;const el=document.getElementById('tab-content');if(el){el.className='fade-up';el.innerHTML=renderSearch();}}
function setPhoto(i){S.photoIdx=i;const el=document.getElementById('tab-content');if(el&&S.listing)el.innerHTML=renderDetail();}
function saveListing(id){const l=LISTINGS.find(x=>x.id===id)||LISTINGS.find(x=>x.id===String(id));if(!l||S.saved.some(h=>h.address===l.address))return;S.saved.unshift({id:Date.now(),address:l.address,county:l.county,town:l.town,price:l.price,taxes:l.taxes,taxNum:l.taxNum,beds:l.bedsBaths,zip:l.zip,userRating:3,aiRating:l.aiRating,status:l.status,notes:'Saved from search. Review taxes, schools, flood, commute.',agentNotes:''});const btn=document.getElementById('save-'+id);if(btn){btn.textContent='✓ Saved';btn.disabled=true;}}
function saveCurrentListing(){if(!S.listing)return;const l=S.listing;if(S.saved.some(h=>h.address===l.address))return;S.saved.unshift({id:Date.now(),address:l.address,county:l.county,town:l.town||'',price:l.price,taxes:l.taxes,taxNum:l.taxNum,beds:l.bedsBaths,zip:l.zip||'',userRating:3,aiRating:l.aiRating,status:l.status,notes:'Saved from property detail. Review taxes, schools, flood, commute.',agentNotes:''});const el=document.getElementById('tab-content');if(el)el.innerHTML=renderDetail();}
function saveMatchedListing(id){const l=S.results&&S.results.find(x=>x.id===id);if(!l||S.saved.some(h=>h.address===l.address))return;S.saved.unshift({id:Date.now(),address:l.address,county:l.county,town:l.town,price:l.price,taxes:l.taxes,taxNum:l.taxNum,beds:l.bedsBaths,zip:l.zip,userRating:3,aiRating:l.matchScore,status:l.matchRank,notes:`AI picked — Match: ${l.matchScore}/100. ${l.pros.slice(0,3).join(', ')}.`,agentNotes:''});const el=document.getElementById('tab-content');if(el)el.innerHTML=renderFinder();}
function saveNewHome(){const h=S.newHome;if(!h.address||!h.price)return;const r=scoreAnswers(S.qAnswers);const aiRating=Math.max(48,Math.min(96,r.score+Math.floor(Math.random()*11)-5));const status=aiRating>=88?'Strong Fit':aiRating>=75?'Good Fit':'Needs Review';S.saved.unshift({id:Date.now(),address:h.address,county:h.county,town:'',price:h.price,taxes:h.taxes||'—',taxNum:0,beds:h.beds||'—',zip:'',userRating:Number(h.userRating),aiRating,status,notes:'New saved home. Run AI Review for deeper analysis.',agentNotes:''});S.newHome={address:'',county:'Middlesex',price:'',taxes:'',beds:'',userRating:3};const el=document.getElementById('tab-content');if(el)el.innerHTML=renderDashboard();}
function deleteHome(id){S.saved=S.saved.filter(h=>h.id!==id);const el=document.getElementById('tab-content');if(el)el.innerHTML=renderDashboard();}
function updateNotes(id,val){const h=S.saved.find(x=>x.id===id);if(h)h.agentNotes=val;}
function buildReport(){const r=scoreAnswers(S.qAnswers);return`HomeFit AI NJ — Buyer Report\n=============================\nBuyer: ${S.buyer.name}\nPhone: ${S.buyer.phone}\nEmail: ${S.buyer.email}\nAgent Status: ${S.buyer.agent}\nGenerated: ${new Date().toLocaleDateString()}\n\nAI FIT SCORE: ${r.score}/100 — ${r.verdict}\n\nSaved Homes (${S.saved.length}):\n${S.saved.map(h=>`  • ${h.address}\n    Price: ${h.price} | Taxes: ${h.taxes}\n    Beds: ${h.beds}\n    Your Rating: ${h.userRating}/5 | AI Fit: ${h.aiRating}/100 | Status: ${h.status}\n    ${h.agentNotes?'Notes: '+h.agentNotes:''}`).join('\n')}\n\nPositive Signals:\n${r.pos.map(p=>'  ✓ '+p).join('\n')||'  None recorded yet.'}\n\nRisk Flags:\n${r.flags.map(f=>'  ⚠ '+f).join('\n')||'  No major risk flags.'}\n\nAI Memory Summary:\n${AI_MEMORY.summary}`;}
function copyReport(){const report=buildReport();const done=()=>{const b=document.getElementById('copy-btn');if(b){b.textContent='✓ Copied!';setTimeout(()=>{b.textContent='📋 Copy Buyer Report';},2500);}};if(navigator.clipboard&&window.isSecureContext){navigator.clipboard.writeText(report).then(done).catch(()=>{const ta=document.createElement('textarea');ta.value=report;document.body.appendChild(ta);ta.select();document.execCommand('copy');ta.remove();done();});}else{const ta=document.createElement('textarea');ta.value=report;document.body.appendChild(ta);ta.select();document.execCommand('copy');ta.remove();done();}}
function emailReport(){const body=encodeURIComponent(buildReport());const subj=encodeURIComponent('HomeFit AI NJ — Buyer Report: '+S.buyer.name);window.location.href=`mailto:?subject=${subj}&body=${body}`;}
function downloadReport(){const a=document.createElement('a');a.href='data:text/plain;charset=utf-8,'+encodeURIComponent(buildReport());a.download=`homefit-report-${S.buyer.name.replace(/\s+/g,'-').toLowerCase()}.txt`;a.click();}
function saveReport(){downloadReport();}
function toggleArr(key,val){const arr=S.prefs[key];if(arr.includes(val)){S.prefs[key]=arr.filter(x=>x!==val);}else{S.prefs[key]=[...arr,val];}const el=document.getElementById('tab-content');if(el)el.innerHTML=renderFinder();}
function runFinder(){S.found=true;S.finding=true;const el=document.getElementById('tab-content');if(el)el.innerHTML=renderFinder();setTimeout(()=>{const scored=LISTINGS.map(l=>{const m=matchListing(l,S.prefs);return Object.assign({},l,{matchScore:m.score,matchRank:m.rank,pros:m.pros,cons:m.cons});}).sort((a,b)=>b.matchScore-a.matchScore);S.results=scored;S.finding=false;const el2=document.getElementById('tab-content');if(el2)el2.innerHTML=renderFinder();},1300);}
function resetFinder(){S.prefs=Object.assign({},DEFAULT_PREFS);S.results=null;S.found=false;S.finding=false;const el=document.getElementById('tab-content');if(el)el.innerHTML=renderFinder();}
function msToggle(id){msOpen[id]=!msOpen[id];const wrap=document.getElementById('mswrap-'+id);if(!wrap)return;wrap.outerHTML=msHTML(id,id==='mustFeatures'?MUST_HAVE:DEAL_BREAKERS,S.prefs[id],id==='mustFeatures'?'Click to select features…':'Click to select deal breakers…');}
function msClose(id){msOpen[id]=false;const wrap=document.getElementById('mswrap-'+id);if(wrap)wrap.outerHTML=msHTML(id,id==='mustFeatures'?MUST_HAVE:DEAL_BREAKERS,S.prefs[id],id==='mustFeatures'?'Click to select features…':'Click to select deal breakers…');}
function msToggleItem(id,val,checked){if(checked){if(!S.prefs[id].includes(val))S.prefs[id]=[...S.prefs[id],val];}else{S.prefs[id]=S.prefs[id].filter(x=>x!==val);}const wrap=document.getElementById('mswrap-'+id);if(wrap)wrap.outerHTML=msHTML(id,id==='mustFeatures'?MUST_HAVE:DEAL_BREAKERS,S.prefs[id],id==='mustFeatures'?'Click to select features…':'Click to select deal breakers…');}
function answerQ(id,val,btn){S.qAnswers[id]=val;btn.closest('.opts-grid').querySelectorAll('.opt').forEach(b=>b.classList.remove('on'));btn.classList.add('on');}
function qNext(){if(S.qStep<QUESTIONS.length-1){S.qStep++;const el=document.getElementById('tab-content');if(el)el.innerHTML=renderReview();}else{S.qDone=true;const el=document.getElementById('tab-content');if(el)el.innerHTML=renderReview();}}
function qBack(){if(S.qStep>0){S.qStep--;const el=document.getElementById('tab-content');if(el)el.innerHTML=renderReview();}}
function restartReview(){S.qStep=0;S.qAnswers={};S.qDone=false;const el=document.getElementById('tab-content');if(el)el.innerHTML=renderReview();}
function sendChat(){const input=document.getElementById('chat-input');const text=(input?input.value:S.chatInput||'').trim();if(!text)return;S.chatInput='';S.msgs.push({role:'user',text});S.msgs.push({role:'bot',text:botReply(text)});const msgs=document.getElementById('chat-msgs');if(msgs){msgs.innerHTML=S.msgs.map(m=>`<div class="msg ${m.role}">${m.text}</div>`).join('');if(input)input.value='';scrollChat();}else{const el=document.getElementById('tab-content');if(el)el.innerHTML=renderChat();setTimeout(scrollChat,50);}}
function chatQuick(text){const input=document.getElementById('chat-input');if(input)input.value=text;S.chatInput=text;sendChat();}
function scrollChat(){const msgs=document.getElementById('chat-msgs');if(msgs)msgs.scrollTop=msgs.scrollHeight;}
function startAllieVoice(){const SpeechRecognition=window.SpeechRecognition||window.webkitSpeechRecognition;if(!SpeechRecognition){alert('Voice input is not supported in this browser. Try Chrome or type your question.');return;}const rec=new SpeechRecognition();rec.lang='en-US';rec.interimResults=false;rec.maxAlternatives=1;rec.start();rec.onresult=e=>{const text=e.results[0][0].transcript;const input=document.getElementById('chat-input');if(input){input.value=text;S.chatInput=text;sendChat();}};rec.onerror=()=>alert('Voice input was blocked or did not hear anything. You can still type your question.');}
function speakAllie(){const last=[...S.msgs].reverse().find(m=>m.role==='bot');const text=last?last.text:'Hi, I am Allie AI, your personal NJ home buying assistant. Ask me anything about your NJ home search.';if(!('speechSynthesis' in window)){alert('Audio readback is not supported in this browser.');return;}const msg=new SpeechSynthesisUtterance(text.replace(/Allie AI™ says:/,'Allie AI™ says:'));msg.rate=.95;msg.pitch=1;speechSynthesis.cancel();speechSynthesis.speak(msg);}
function startSearchVoice(){const SpeechRecognition=window.SpeechRecognition||window.webkitSpeechRecognition;if(!SpeechRecognition){alert('Voice search is not supported in this browser. Try Chrome or type the town or ZIP.');return;}const rec=new SpeechRecognition();rec.lang='en-US';rec.interimResults=false;rec.maxAlternatives=1;rec.start();rec.onresult=e=>{const text=e.results[0][0].transcript;const input=document.getElementById('s-query');if(input){input.value=text.replace(/\s+/g,' ').trim();refreshSearch();}};rec.onerror=()=>alert('Voice search was blocked or did not hear anything.');}
if(localStorage.getItem('hf-dark')==='1'){S.dark=true;document.documentElement.classList.add('dark');document.getElementById('theme-btn').textContent='☀️';}
document.addEventListener('mousedown',function(e){Object.keys(msOpen).forEach(id=>{if(msOpen[id]){const wrap=document.getElementById('mswrap-'+id);if(wrap&&!wrap.contains(e.target)){msOpen[id]=false;const w2=document.getElementById('mswrap-'+id);if(w2)w2.outerHTML=msHTML(id,id==='mustFeatures'?MUST_HAVE:DEAL_BREAKERS,S.prefs[id],id==='mustFeatures'?'Click to select features…':'Click to select deal breakers…');}}});});
renderApp();
</script>
</body>
